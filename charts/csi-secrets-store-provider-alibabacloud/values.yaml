rrsa:
  # Specifies whether using rrsa and enable sa token volume projection, default is false
  # Set to true to enable RRSA authentication (Provider SA or Pod SA)
  # NOTE: This feature is in alpha and only available in ACK managed clusters and ACK Lingjun clusters.
  # When enabled:
  #   - Provider mounts its own SA token via projected volume (for Provider SA RRSA auth)
  #   - Pod SA tokens are automatically passed by CSI Driver via NodePublishVolume secrets
  enable: false
  
  # RRSA OIDC Provider configuration
  # Option 1: Auto-construct OIDC Provider ARN from account ID and cluster ID (recommended)
  # The provider will automatically construct it using:
  # Format: acs:ram::<accountId>:oidc-provider/ack-rrsa-<clusterId>
  accountId: ""
  clusterId: ""
  #
  # Option 2: Explicitly specify OIDC Provider ARN via envVarsFromSecret
  # Create a K8s Secret with ALICLOUD_OIDC_PROVIDER_ARN and reference it via envVarsFromSecret:
  #   kubectl create secret generic alibaba-credentials -n kube-system \
  #     --from-literal=oidcproviderarn=acs:ram::<accountId>:oidc-provider/<providerName>
  # Then configure envVarsFromSecret as a Map (not a string):
  #   envVarsFromSecret:
  #     ALICLOUD_OIDC_PROVIDER_ARN:
  #       secretKeyRef: alibaba-credentials
  #       key: oidcproviderarn

## Install default service account and RBAC
rbac:
  install: true
