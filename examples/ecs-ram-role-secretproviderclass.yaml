# ============================================================================
# ECS RAM Role Authentication Example (Zero Configuration)
# ============================================================================
#
# Authentication Flow:
#   1. Provider detects no explicit credentials configured
#   2. Automatically calls ECS metadata service
#   3. Retrieves temporary credentials from the RAM Role attached to the ECS node
#   4. Uses credentials to access KMS secrets
#   5. Credentials auto-rotate before expiration
#
# Prerequisites:
#   1. ACK cluster Worker nodes have a RAM Role (WorkerRole)
#   2. Grant KMS access permissions to the WorkerRole:
#      
#      # Create RAM Policy for KMS access
#      aliyun ram CreatePolicy --PolicyName <policy-name> --PolicyDocument '{
#        "Version": "1",
#        "Statement": [{
#          "Effect": "Allow",
#          "Action": ["kms:GetSecretValue", "kms:Decrypt"],
#          "Resource": ["acs:kms:<REGION>:<ACCOUNT_ID>:secret/*"]
#        }]
#      }'
#      
#      # Attach Policy to WorkerRole
#      aliyun ram AttachPolicyToRole --PolicyType Custom --PolicyName <policy-name> --RoleName <worker-role-name>
#   3. Deploy Provider via Helm (no special configuration needed):
#      helm upgrade --install csi-secrets-store-provider-alibabacloud \
#        csi-secrets-store-provider-alibabacloud/csi-secrets-store-provider-alibabacloud \
#        -n kube-system
#      
#      Make sure envVarsFromSecret is empty or not configured, so the provider
#      falls through to ECS RAM Role authentication.
#
# Use Cases:
#   - ECS nodes already have RAM Role attached
#   - Quick deployment with minimal configuration
#   - Automatic credential rotation without manual intervention
#
# Important Notes:
#   - This is a ZERO configuration authentication method
#   - No envVarsFromSecret, no RRSA, no AK/SK needed
#   - All Pods on the same ECS node share the same permissions
#   - Credentials are automatically rotated by the ECS metadata service
#   - ECS RAM Role has the lowest priority (Priority 6) in the auth chain
# ============================================================================

# ============================================================================
# Step 1: Create SecretProviderClass
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ecs-ram-role-kms-secrets
  namespace: default
spec:
  provider: alibabacloud
  parameters:
    # Region where KMS secrets are located
    region: "cn-hangzhou"

    # KMS secrets to mount
    objects: |
      - objectName: "app/database-password"
        objectType: "kms"
        objectAlias: "db-password"
        # (OPTIONAL) Cross-account access: uncomment crossAccountRoleArn
        # if the KMS secrets are in a different Alibaba Cloud account
        # crossAccountRoleArn: "acs:ram::<TARGET_ACCOUNT_ID>:role/<TARGET_ROLE_NAME>"

      - objectName: "app/api-key"
        objectType: "kms"
        objectAlias: "api-key"
---
# ============================================================================
# Step 2: Deploy Pod
# ============================================================================
# No special Pod configuration needed — just reference the SecretProviderClass.

apiVersion: v1
kind: Pod
metadata:
  name: ecs-ram-role-auth-demo
  namespace: default
  labels:
    app: ecs-ram-role-demo
spec:
  containers:
  - name: app
    image: busybox:latest
    command: ["sh", "-c", "cat /mnt/secrets/db-password && sleep 3600"]

    volumeMounts:
    - name: secrets-store-inline
      mountPath: /mnt/secrets
      readOnly: true

  volumes:
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "ecs-ram-role-kms-secrets"

# ============================================================================
# Verification Steps:
#
# 1. Check Pod status:
#    kubectl get pod ecs-ram-role-auth-demo
#
# 2. Verify secrets are mounted:
#    kubectl exec ecs-ram-role-auth-demo -- ls -la /mnt/secrets/
#
# 3. View secret content:
#    kubectl exec ecs-ram-role-auth-demo -- cat /mnt/secrets/db-password
#
# Troubleshooting:
#
# - If authentication fails with "credential not found":
#   Verify the ECS node has a RAM Role attached:
#   kubectl get nodes -o wide  # find the node
#   Then check in Alibaba Cloud console that the ECS instance has a RAM Role.
#
# - If the provider falls through to a different auth method:
#   Ensure no envVarsFromSecret or RRSA is configured in Helm values.
#   ECS RAM Role has the lowest priority (Priority 6) in the auth chain.
#
# - Verify the RAM Role has KMS permissions:
#   Check in RAM console that the attached role has kms:GetSecretValue.
#
# ============================================================================
