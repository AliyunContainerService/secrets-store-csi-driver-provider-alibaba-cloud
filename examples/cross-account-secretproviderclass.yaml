# ============================================================================
# Cross-Account Authentication Example
# ============================================================================
#
# Cross-account access is simple: just add `crossAccountRoleArn` parameter to
# your SecretProviderClass. All authentication methods (AK/SK, RAM Role, RRSA,
# Pod SA, ECS RAM Role, Node Publish Secret) support cross-account access with
# this single parameter.
#
# Authentication Flow:
#   1. Base credential authenticates to source account (cluster account)
#   2. Provider calls AssumeRole using crossAccountRoleArn to switch to target
#   3. Access KMS secrets in target account
#
# Permission Requirements (Least Privilege):
#   Source Account (Cluster Account):
#     - sts:AssumeRole permission (to assume target account role)
#     - NO KMS permission needed
#
#   Target Account (KMS Account):
#     - Trust policy allowing source account identity
#     - KMS access permission (kms:GetSecretValue)
#     - NO STS permission needed
#
# Prerequisites:
#   1. Base authentication configured (any method: AK/SK, RRSA, ECS RAM Role, etc.)
#   2. Create target account RAM Role with trust policy (trust source account):
#      aliyun ram CreateRole --RoleName cross-account-kms-access-role --AssumeRolePolicyDocument '{
#        "Statement": [{
#          "Action": "sts:AssumeRole",
#          "Effect": "Allow",
#          "Principal": {
#            "RAM": ["acs:ram::<SOURCE_ACCOUNT_ID>:root"]
#          }
#        }],
#        "Version": "1"
#      }'
#      
#      # Create KMS access policy
#      aliyun ram CreatePolicy --PolicyName cross-account-kms-access --PolicyDocument '{
#        "Version": "1",
#        "Statement": [{
#          "Effect": "Allow",
#          "Action": ["kms:GetSecretValue", "kms:Decrypt"],
#          "Resource": ["acs:kms:<TARGET_REGION>:<TARGET_ACCOUNT_ID>:secret/prod/*"]
#        }]
#      }'
#      
#      # Attach policy to role
#      aliyun ram AttachPolicyToRole --PolicyType Custom --PolicyName cross-account-kms-access --RoleName cross-account-kms-access-role
#   3. Source account identity must have sts:AssumeRole permission:
#      
#      aliyun ram CreatePolicy --PolicyName assume-cross-account-role --PolicyDocument '{
#        "Version": "1",
#        "Statement": [{
#          "Effect": "Allow",
#          "Action": "sts:AssumeRole",
#          "Resource": "acs:ram::<TARGET_ACCOUNT_ID>:role/cross-account-kms-access-role"
#        }]
#      }'
#
# Use Cases:
#   - Centralized KMS secrets in a dedicated account
#   - Multi-account architecture with shared secret management
#   - Cross-environment (dev/staging/prod) secret access
# ============================================================================

# ============================================================================
# Step 1: Create SecretProviderClass
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cross-account-secrets
  namespace: default
spec:
  provider: alibabacloud
  parameters:
    # Region where KMS secrets are located (target account region)
    region: "cn-hangzhou"

    # KMS secrets to mount (same as single-account configuration)
    # Add crossAccountRoleArn to each object to enable cross-account access
    objects: |
      - objectName: "prod/database-password"
        objectType: "kms"
        objectAlias: "db-password"
        # [CORE] Cross-account RAM Role ARN in Target Account (KMS account)
        # Format: acs:ram::<TARGET_ACCOUNT_ID>:role/<ROLE_NAME>
        crossAccountRoleArn: "acs:ram::123456789012:role/cross-account-kms-access-role"

      - objectName: "prod/api-key"
        objectType: "kms"
        objectAlias: "api-key"
        crossAccountRoleArn: "acs:ram::123456789012:role/cross-account-kms-access-role"
---
# ============================================================================
# Step 2: Deploy Pod
# ============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: cross-account-auth-demo
  namespace: default
  labels:
    app: cross-account-demo
spec:
  containers:
  - name: app
    image: busybox:latest
    command: ["sh", "-c", "cat /mnt/secrets/db-password && sleep 3600"]

    volumeMounts:
    - name: secrets-store-inline
      mountPath: /mnt/secrets
      readOnly: true

  volumes:
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "cross-account-secrets"

# ============================================================================
#
# Verification Steps:
#
# 1. Check Pod status:
#    kubectl get pod cross-account-auth-demo
#
# 2. Verify secrets are mounted:
#    kubectl exec cross-account-auth-demo -- ls -la /mnt/secrets/
#
# 3. View secret content:
#    kubectl exec cross-account-auth-demo -- cat /mnt/secrets/db-password
#
# Troubleshooting:
#
# - If AssumeRole fails with "NoPermission":
#   Verify the target account RAM Role trust policy allows the source account.
#
# - If authentication fails with "InvalidAccessKeyId":
#   Check that base authentication is correctly configured in Helm values.
#
# - Check provider logs for detailed error:
#   kubectl logs -l app=csi-secrets-store-provider-alibabacloud -n kube-system
#
# ============================================================================
