# ============================================================================
# Node Publish Secret Authentication Example
# ============================================================================
#
# Authentication Flow:
#   1. User creates K8s Secret with access_key and access_secret
#   2. Pod's CSI volume references the Secret via nodePublishSecretRef
#   3. CSI Driver passes Secret content to Provider during NodePublishVolume
#   4. Provider extracts AK/SK and creates credential to access KMS
#
# Prerequisites:
#   1. A RAM User with AK/SK and KMS
#   2. The RAM User must have KMS access permissions:
#      
#      aliyun ram CreatePolicy --PolicyName <policy-name> --PolicyDocument '{
#        "Version": "1",
#        "Statement": [{
#          "Effect": "Allow",
#          "Action": ["kms:GetSecretValue", "kms:Decrypt"],
#          "Resource": ["acs:kms:<REGION>:<ACCOUNT_ID>:secret/*"]
#        }]
#      }'
#
#      aliyun ram AttachPolicyToUser --PolicyType Custom --PolicyName <policy-name> --UserName <user-name>
#   3. Create a Kubernetes Secret containing AK/SK (must be in the SAME namespace as the Pod):
#      kubectl create secret generic alibaba-credentials -n default \
#        --from-literal=access_key=<your-access-key-id> \
#        --from-literal=access_secret=<your-access-key-secret>
#
# Use Cases:
#   - AK/SK stored in Kubernetes Secret
#   - Pass credentials via CSI Driver's standard mechanism
#   - Integration with existing K8s Secret management workflows
#
# Important Notes:
#   - The Secret MUST exist in the same namespace as the Pod
#   - The Pod volume MUST explicitly configure nodePublishSecretRef
#   - This is a standard CSI Driver mechanism
# ============================================================================

# ============================================================================
# Step 1: Create SecretProviderClass
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: node-publish-kms-secrets
  namespace: default
spec:
  provider: alibabacloud
  parameters:
    # Region where KMS secrets are located
    region: "cn-hangzhou"

    # KMS secrets to mount
    objects: |
      - objectName: "app/database-password"
        objectType: "kms"
        objectAlias: "db-password"
        # (OPTIONAL) Cross-account access: uncomment crossAccountRoleArn
        # if the KMS secrets are in a different Alibaba Cloud account
        # crossAccountRoleArn: "acs:ram::<TARGET_ACCOUNT_ID>:role/<TARGET_ROLE_NAME>"

      - objectName: "app/api-key"
        objectType: "kms"
        objectAlias: "api-key"
---
# ============================================================================
# Step 2: Deploy Pod with nodePublishSecretRef
# ============================================================================
# CRITICAL: The Pod volume MUST configure nodePublishSecretRef to reference
# the K8s Secret containing AK/SK. Without this, the provider will not
# receive the credentials.

apiVersion: v1
kind: Pod
metadata:
  name: node-publish-secret-demo
  namespace: default
  labels:
    app: node-publish-secret-demo
spec:
  containers:
  - name: app
    image: busybox:latest
    command: ["sh", "-c", "cat /mnt/secrets/db-password && sleep 3600"]

    volumeMounts:
    - name: secrets-store-inline
      mountPath: /mnt/secrets
      readOnly: true

  volumes:
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "node-publish-kms-secrets"
      # REQUIRED: Reference the K8s Secret containing AK/SK
      # This Secret must be in the SAME namespace as this Pod
      nodePublishSecretRef:
        name: alibaba-credentials

# ============================================================================
# Verification Steps:
#
# 1. Check Pod status:
#    kubectl get pod node-publish-secret-demo
#
# 2. Verify secrets are mounted:
#    kubectl exec node-publish-secret-demo -- ls -la /mnt/secrets/
#
# 3. View secret content:
#    kubectl exec node-publish-secret-demo -- cat /mnt/secrets/db-password
#
# Troubleshooting:
#
# - If Pod fails to start with "secret not found" error:
#   Ensure the Secret exists in the same namespace as the Pod
#   kubectl get secret alibaba-credentials -n default
#
# - If authentication fails:
#   Verify the Secret contains 'access_key' and 'access_secret' fields
#   kubectl get secret alibaba-credentials -n default -o jsonpath='{.data}'
#
# ============================================================================
