# ============================================================================
# Pod SA RRSA Authentication Example
# ============================================================================
#
# Authentication Flow:
#   1. Pod's ServiceAccount gets OIDC token via CSI Driver tokenRequests
#   2. Provider exchanges OIDC token for Pod SA's RAM Role credentials
#   3. Access KMS secrets using Pod SA's permissions
#
# RoleArn Configuration:
#   RoleArn is auto-detected from the ServiceAccount annotation:
#   ack.alibabacloud.com/role-arn
#
# Key Differences from Provider RRSA:
#   - Requires `usePodServiceAccountToken: "true"` in SecretProviderClass
#   - Requires `serviceAccountName` in Pod spec
#   - Each Pod can use a different RAM Role (fine-grained isolation)
#   - Authentication is handled at the Pod level
#
# Prerequisites:
#   1. RRSA must be enabled on your ACK cluster:
#      ack-ram-tool rrsa enable -c <clusterId>
#   2. Configure OIDC Provider ARN in the Provider DaemonSet:
#      
#      Option A: Auto-construct (recommended)
#      helm upgrade --install csi-secrets-store-provider-alibabacloud \
#        csi-secrets-store-provider-alibabacloud/csi-secrets-store-provider-alibabacloud \
#        -n kube-system \
#        --set rrsa.enable=true \
#        --set rrsa.accountId=<accountId> \
#        --set rrsa.clusterId=<clusterId>
#      
#      Option B: Explicit via envVarsFromSecret
#      kubectl create secret generic alibaba-credentials -n kube-system \
#        --from-literal=oidcproviderarn=acs:ram::<accountId>:oidc-provider/ack-rrsa-<clusterId>
#      helm upgrade --install csi-secrets-store-provider-alibabacloud \
#        csi-secrets-store-provider-alibabacloud/csi-secrets-store-provider-alibabacloud \
#        -n kube-system \
#        --set rrsa.enable=true \
#        --set envVarsFromSecret.ALICLOUD_OIDC_PROVIDER_ARN.secretKeyRef=alibaba-credentials \
#        --set envVarsFromSecret.ALICLOUD_OIDC_PROVIDER_ARN.key=oidcproviderarn
#   3. Create a RAM Role with trust policy for Pod SA:
#      
#      aliyun ram CreateRole --RoleName pod-sa-kms-access-role --AssumeRolePolicyDocument '{
#        "Statement": [{
#          "Action": "sts:AssumeRole",
#          "Effect": "Allow",
#          "Principal": {
#            "Federated": "acs:ram::<accountId>:oidc-provider/ack-rrsa-<clusterId>"
#          },
#          "Condition": {
#            "StringEquals": {
#              "oidc:iss": ["https://oidc-ack-<region>.oss-<region>.aliyuncs.com/<clusterId>"],
#              "oidc:aud": ["sts.aliyuncs.com"],
#              "oidc:sub": ["system:serviceaccount:<namespace>:app-pod-sa"]
#            }
#          }
#        }],
#        "Version": "1"
#      }'
#      
#      # Create RAM Policy
#      aliyun ram CreatePolicy --PolicyName ack-kms-read --PolicyDocument '{
#        "Version": "1",
#        "Statement": [{
#          "Effect": "Allow",
#          "Action": ["kms:GetSecretValue", "kms:Decrypt"],
#          "Resource": ["acs:kms:<REGION>:<ACCOUNT_ID>:secret/*"]
#        }]
#      }'
#      
#      # Attach Policy to Role
#      aliyun ram AttachPolicyToRole --PolicyType Custom --PolicyName ack-kms-read --RoleName pod-sa-kms-access-role
#   4. Create a K8s Secret for testing (optional):
#      kubectl create secret generic kms-test --from-literal=password=1234 -n <namespace>
#
# Use Cases:
#   - Multi-tenant applications requiring isolated secret access
#   - Different environments (dev/staging/prod) with separate permissions
#   - Compliance requirements mandating Pod-level access control
# ============================================================================

# ============================================================================
# Step 1: Create ServiceAccount
# ============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-pod-sa
  namespace: default
  annotations:
    # Recommended: Specify RoleArn via annotation (auto-detected by Provider)
    # Format: acs:ram::<ACCOUNT_ID>:role/<ROLE_NAME>
    ack.alibabacloud.com/role-arn: "acs:ram::123456789012:role/pod-sa-kms-access-role"
---
# ============================================================================
# Step 2: Create SecretProviderClass
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: pod-sa-kms-secrets
  namespace: default
spec:
  provider: alibabacloud
  parameters:
    # Region where KMS secrets are located
    region: "cn-hangzhou"
    
    # Enable Pod SA authentication
    # This tells the provider to use the Pod's ServiceAccount token
    usePodServiceAccountToken: "true"
    
    # KMS secret to mount
    objects: |
      - objectName: "test-kms"
        objectType: "kms"
        objectAlias: "test-kms"
---
# ============================================================================
# Step 3: Deploy Pod with ServiceAccount
# ============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: pod-sa-auth-demo
  namespace: default
  labels:
    app: pod-sa-demo
spec:
  # Bind Pod to the ServiceAccount with RAM Role
  serviceAccountName: app-pod-sa
  
  containers:
  - name: app
    image: busybox:latest
    command: ["sh", "-c", "cat /mnt/secrets/test-kms && sleep 3600"]
    
    volumeMounts:
    - name: secrets-store-inline
      mountPath: /mnt/secrets
      readOnly: true
  
  volumes:
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "pod-sa-kms-secrets"

# ============================================================================
# Verification Steps:
#
# 1. Check Pod status:
#    kubectl get pod pod-sa-auth-demo
#
# 2. Verify secrets are mounted:
#    kubectl exec pod-sa-auth-demo -- ls -la /mnt/secrets/
#
# 3. View secret content:
#    kubectl exec pod-sa-auth-demo -- cat /mnt/secrets/test-kms
#
# Troubleshooting:
#
# - If Pod fails to start, check events:
#   kubectl describe pod pod-sa-auth-demo
#
# - Verify CSI Driver tokenRequests is configured (v1.6.0+):
#   helm get values csi-secrets-store-provider-alibabacloud -n kube-system
#
# - Check provider logs:
#   kubectl logs -l app=csi-secrets-store-provider-alibabacloud -n kube-system
#
# ============================================================================
