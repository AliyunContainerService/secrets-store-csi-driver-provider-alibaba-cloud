# ============================================================================
# AK/SK Static Credentials Authentication Example
# ============================================================================
#
# This example demonstrates AK/SK static credentials authentication, which
# uses long-term AccessKey ID and AccessKey Secret directly without assuming
# a RAM Role.
#
# Authentication Flow:
#   1. Provider reads ACCESS_KEY_ID and SECRET_ACCESS_KEY from environment
#      variables (via envVarsFromSecret)
#   2. Uses AK/SK directly to create credential
#   3. Accesses KMS secrets using the AK/SK permissions
#
# Key Differences from RAM Role Authentication:
#   - AK/SK Static: Only needs ACCESS_KEY_ID + SECRET_ACCESS_KEY
#   - RAM Role: Additionally needs ALICLOUD_ROLE_ARN for AssumeRole
#   - AK/SK Static: Uses long-term credentials directly (less secure)
#   - RAM Role: Gets temporary credentials via AssumeRole (more secure)
#
# Prerequisites:
#   1. A RAM User with AK/SK
#   2. The RAM User must have KMS access permissions
#      {
#        "Version": "1",
#        "Statement": [{
#          "Effect": "Allow",
#          "Action": ["kms:GetSecretValue", "kms:Decrypt"],
#          "Resource": ["acs:kms:<REGION>:<ACCOUNT_ID>:secret/prod/*"]
#        }]
#      }
#   3. Create a Kubernetes Secret containing AK/SK:
#      kubectl create secret generic alibaba-credentials -n <namespace> \
#        --from-literal=id=<your-access-key-id> \
#        --from-literal=secret=<your-access-key-secret>
#   4. Deploy Provider via Helm with credentials:
#      helm upgrade --install csi-secrets-store-provider-alibabacloud \
#        csi-secrets-store-provider-alibabacloud/csi-secrets-store-provider-alibabacloud \
#        -f values.yaml -n kube-system
#      
#      values.yaml configuration:
#         envVarsFromSecret:
#           ACCESS_KEY_ID:
#             secretKeyRef: alibaba-credentials
#             key: id
#           SECRET_ACCESS_KEY:
#             secretKeyRef: alibaba-credentials
#             key: secret
#      
#      NOTE: Do NOT configure ALICLOUD_ROLE_ARN — that would trigger RAM Role
#      authentication instead of AK/SK Static.
#
# Use Cases:
#   - Testing environments
#   - Quick verification / debugging
#   - Legacy system compatibility
#
# WARNING: This method is NOT recommended for production environments.
# AK/SK static credentials are long-term and harder to rotate.
# Consider using RRSA or RAM Role authentication instead.
# ============================================================================

# ============================================================================
# Step 1: Create SecretProviderClass
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ak-sk-kms-secrets
  namespace: default
spec:
  provider: alibabacloud
  parameters:
    # Region where KMS secrets are located
    region: "cn-hangzhou"

    # KMS secrets to mount
    objects: |
      - objectName: "app/database-password"
        objectType: "kms"
        objectAlias: "db-password"
        # (OPTIONAL) Cross-account access: uncomment crossAccountRoleArn
        # if the KMS secrets are in a different Alibaba Cloud account
        # crossAccountRoleArn: "acs:ram::<TARGET_ACCOUNT_ID>:role/<TARGET_ROLE_NAME>"

      - objectName: "app/api-key"
        objectType: "kms"
        objectAlias: "api-key"
---
# ============================================================================
# Step 2: Deploy Pod
# ============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: ak-sk-auth-demo
  namespace: default
  labels:
    app: ak-sk-demo
spec:
  containers:
  - name: app
    image: busybox:latest
    command: ["sh", "-c", "cat /mnt/secrets/db-password && sleep 3600"]

    volumeMounts:
    - name: secrets-store-inline
      mountPath: /mnt/secrets
      readOnly: true

  volumes:
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "ak-sk-kms-secrets"

# ============================================================================
# Verification Steps:
#
# 1. Check Pod status:
#    kubectl get pod ak-sk-auth-demo
#
# 2. Verify secrets are mounted:
#    kubectl exec ak-sk-auth-demo -- ls -la /mnt/secrets/
#
# 3. View secret content:
#    kubectl exec ak-sk-auth-demo -- cat /mnt/secrets/db-password
#
# ============================================================================
