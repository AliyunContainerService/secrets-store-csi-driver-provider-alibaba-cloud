# ============================================================================
# RAM Role (AK/SK + RoleArn) Authentication Example
# ============================================================================
#
# Authentication Flow:
#   1. Provider reads AK/SK from environment variables (via envVarsFromSecret)
#   2. Uses AK/SK as base credential
#   3. Calls STS AssumeRole API with ALICLOUD_ROLE_ARN
#   4. Gets temporary credentials (AK/SK/SecurityToken)
#   5. Uses temporary credentials to access KMS secrets
#
# Key Differences from AK/SK Static Credentials:
#   - RAM Role authentication requires ALICLOUD_ROLE_ARN
#   - AK/SK Static only requires ACCESS_KEY_ID + SECRET_ACCESS_KEY
#   - RAM Role provides temporary credentials (more secure)
#   - AK/SK Static uses long-term credentials directly
#
# Prerequisites:
#   1. A RAM User with AK/SK and sts:AssumeRole permission
#      {
#        "Version": "1",
#        "Statement": [{
#          "Effect": "Allow",
#          "Action": "sts:AssumeRole",
#          "Resource": "acs:ram::<ACCOUNT_ID>:role/<role-name>"
#        }]
#      }
#   2. Create a RAM Role with trust policy and permissions:
#      
#      # Create RAM Role with trust policy
#      aliyun ram CreateRole --RoleName <role-name> --AssumeRolePolicyDocument '{
#        "Statement": [{
#          "Action": "sts:AssumeRole",
#          "Effect": "Allow",
#          "Principal": {
#            "RAM": ["acs:ram::<ACCOUNT_ID>:root"]
#          }
#        }],
#        "Version": "1"
#      }'
#      
#      # Create RAM Policy
#      aliyun ram CreatePolicy --PolicyName <policy-name> --PolicyDocument '{
#        "Version": "1",
#        "Statement": [{
#          "Effect": "Allow",
#          "Action": ["kms:GetSecretValue", "kms:Decrypt"],
#          "Resource": ["acs:kms:<REGION>:<ACCOUNT_ID>:secret/*"]
#        }]
#      }'
#      
#      # Attach Policy to Role
#      aliyun ram AttachPolicyToRole --PolicyType Custom --PolicyName <policy-name> --RoleName <role-name>
#   3. Create a Kubernetes Secret containing AK/SK and RoleArn:
#      kubectl create secret generic alibaba-credentials -n <namespace> \
#        --from-literal=id=<your-access-key-id> \
#        --from-literal=secret=<your-access-key-secret> \
#        --from-literal=rolearn=acs:ram::<ACCOUNT_ID>:role/<role-name>
#   4. Deploy Provider via Helm with credentials:
#      helm upgrade --install csi-secrets-store-provider-alibabacloud \
#        csi-secrets-store-provider-alibabacloud/csi-secrets-store-provider-alibabacloud \
#        -f values.yaml -n kube-system
#      
#      values.yaml configuration:
#      envVarsFromSecret:
#        ACCESS_KEY_ID:
#          secretKeyRef: alibaba-credentials
#          key: id
#        SECRET_ACCESS_KEY:
#          secretKeyRef: alibaba-credentials
#          key: secret
#        ALICLOUD_ROLE_ARN:
#          secretKeyRef: alibaba-credentials
#          key: rolearn
#
# Use Cases:
#   - Using AK/SK to assume a RAM Role for temporary credentials
#   - Role-based access control with existing AK/SK
#   - Scenarios where RRSA is not available
# ============================================================================

# ============================================================================
# Step 1: Create SecretProviderClass
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ram-role-kms-secrets
  namespace: default
spec:
  provider: alibabacloud
  parameters:
    # Region where KMS secrets are located
    region: "cn-hangzhou"

    # KMS secrets to mount
    objects: |
      - objectName: "app/database-password"
        objectType: "kms"
        objectAlias: "db-password"
        # (OPTIONAL) Cross-account access: uncomment crossAccountRoleArn
        # if the KMS secrets are in a different Alibaba Cloud account
        # crossAccountRoleArn: "acs:ram::<TARGET_ACCOUNT_ID>:role/<TARGET_ROLE_NAME>"

      - objectName: "app/api-key"
        objectType: "kms"
        objectAlias: "api-key"
---
# ============================================================================
# Step 2: Deploy Pod with ServiceAccount
# ============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: ram-role-auth-demo
  namespace: default
  labels:
    app: ram-role-demo
spec:
  containers:
  - name: app
    image: busybox:latest
    command: ["sh", "-c", "cat /mnt/secrets/db-password && sleep 3600"]

    volumeMounts:
    - name: secrets-store-inline
      mountPath: /mnt/secrets
      readOnly: true

  volumes:
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "ram-role-kms-secrets"

# ============================================================================
#
# 1. Check Pod status:
#    kubectl get pod ram-role-auth-demo
#
# 2. Verify secrets are mounted:
#    kubectl exec ram-role-auth-demo -- ls -la /mnt/secrets/
#
# 3. View secret content:
#    kubectl exec ram-role-auth-demo -- cat /mnt/secrets/db-password
#
# ============================================================================
