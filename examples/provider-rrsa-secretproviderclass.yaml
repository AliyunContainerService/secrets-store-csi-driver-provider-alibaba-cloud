# ============================================================================
# Provider RRSA Authentication Example
# ============================================================================
#
# Authentication Flow:
#   1. Provider DaemonSet's ServiceAccount gets OIDC token via CSI Driver tokenRequests
#   2. Provider exchanges OIDC token for Provider SA's RAM Role credentials
#   3. Access KMS secrets using Provider SA's permissions
#
# Key Differences from Pod SA RRSA:
#   - No `usePodServiceAccountToken` in SecretProviderClass
#   - No `serviceAccountName` or SA annotation needed in Pod
#   - All Pods share the Provider's permissions (no Pod-level isolation)
#   - Authentication is handled at the Provider DaemonSet level
#
# Prerequisites:
#   1. RRSA must be enabled on your ACK cluster:
#      ack-ram-tool rrsa enable -c <clusterId>
#   2. Create a RAM Role for Provider's ServiceAccount with trust policy:
#      
#      aliyun ram CreateRole --RoleName provider-rrsa-role --AssumeRolePolicyDocument '{
#        "Statement": [{
#          "Action": "sts:AssumeRole",
#          "Effect": "Allow",
#          "Principal": {
#            "Federated": "acs:ram::<accountId>:oidc-provider/ack-rrsa-<clusterId>"
#          },
#          "Condition": {
#            "StringEquals": {
#              "oidc:iss": ["https://oidc-ack-<region>.oss-<region>.aliyuncs.com/<clusterId>"],
#              "oidc:aud": ["sts.aliyuncs.com"],
#              "oidc:sub": ["system:serviceaccount:kube-system:csi-secrets-store-provider-alibabacloud"]
#            }
#          }
#        }],
#        "Version": "1"
#      }'
#      
#      # Create RAM Policy
#      aliyun ram CreatePolicy --PolicyName provider-kms-read --PolicyDocument '{
#        "Version": "1",
#        "Statement": [{
#          "Effect": "Allow",
#          "Action": ["kms:GetSecretValue", "kms:Decrypt"],
#          "Resource": "acs:kms:<REGION>:<accountId>:secret/*"
#        }]
#      }'
#      
#      # Attach Policy to Role
#      aliyun ram AttachPolicyToRole --PolicyType Custom --PolicyName provider-kms-read --RoleName provider-rrsa-role
#   3. Create a Kubernetes Secret with RoleArn:
#      kubectl create secret generic alibaba-credentials -n kube-system \
#        --from-literal=rolearn=acs:ram::<accountId>:role/provider-rrsa-role
#   4. Deploy Provider via Helm with RRSA configuration:
#      
#      Option A: Auto-construct OIDC Provider ARN (recommended)
#      helm upgrade --install csi-secrets-store-provider-alibabacloud \
#        csi-secrets-store-provider-alibabacloud/csi-secrets-store-provider-alibabacloud \
#        -n kube-system \
#        --set rrsa.enable=true \
#        --set rrsa.accountId=<accountId> \
#        --set rrsa.clusterId=<clusterId> \
#        --set envVarsFromSecret.ALICLOUD_ROLE_ARN.secretKeyRef=alibaba-credentials \
#        --set envVarsFromSecret.ALICLOUD_ROLE_ARN.key=rolearn
#      
#      Option B: Explicit OIDC Provider ARN via envVarsFromSecret
#      kubectl create secret generic alibaba-credentials -n kube-system \
#        --from-literal=oidcproviderarn=acs:ram::<accountId>:oidc-provider/ack-rrsa-<clusterId> \
#        --from-literal=rolearn=acs:ram::<accountId>:role/provider-rrsa-role
#      helm upgrade --install csi-secrets-store-provider-alibabacloud \
#        csi-secrets-store-provider-alibabacloud/csi-secrets-store-provider-alibabacloud \
#        -n kube-system \
#        --set rrsa.enable=true \
#        --set envVarsFromSecret.ALICLOUD_OIDC_PROVIDER_ARN.secretKeyRef=alibaba-credentials \
#        --set envVarsFromSecret.ALICLOUD_OIDC_PROVIDER_ARN.key=oidcproviderarn \
#        --set envVarsFromSecret.ALICLOUD_ROLE_ARN.secretKeyRef=alibaba-credentials \
#        --set envVarsFromSecret.ALICLOUD_ROLE_ARN.key=rolearn
#
# Use Cases:
#   - Cluster-wide unified authentication
#   - Simplified Pod configuration (no Pod-level RRSA needed)
#   - Rapid deployment scenarios
# ============================================================================

# ============================================================================
# Step 1: Create SecretProviderClass
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: provider-rrsa-secrets
  namespace: default
spec:
  provider: alibabacloud
  parameters:
    # Region where KMS secrets are located
    region: "cn-hangzhou"

    # No authentication-specific parameters needed.
    # The Provider DaemonSet handles RRSA authentication using its own ServiceAccount.

    # KMS secrets to mount
    objects: |
      - objectName: "my-secret"
        objectType: "kms"
        objectAlias: "my-secret"
        # (OPTIONAL) Cross-account access: uncomment crossAccountRoleArn
        # if the KMS secrets are in a different Alibaba Cloud account
        # crossAccountRoleArn: "acs:ram::<TARGET_ACCOUNT_ID>:role/<TARGET_ROLE_NAME>"

---
# ============================================================================
# Step 2: Deploy Pod with ServiceAccount
# ============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: provider-rrsa-demo
  namespace: default
  labels:
    app: provider-rrsa-demo
spec:
  containers:
  - name: app
    image: busybox:latest
    command: ["sh", "-c", "cat /mnt/secrets/my-secret && sleep 3600"]

    volumeMounts:
    - name: secrets-store-inline
      mountPath: /mnt/secrets
      readOnly: true

  volumes:
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "provider-rrsa-secrets"

# ============================================================================
# Verification Steps:
#
# 1. Check Pod status:
#    kubectl get pod provider-rrsa-demo
#
# 3. Verify secrets are mounted:
#    kubectl exec provider-rrsa-demo -- ls -la /mnt/secrets/
#
# 3. View secret content:
#    kubectl exec provider-rrsa-demo -- cat /mnt/secrets/my-secret
#
# Troubleshooting:
#
# - If Pod fails to start, check events:
#   kubectl describe pod provider-rrsa-demo
#
# - Check provider logs:
#   kubectl logs -l app=csi-secrets-store-provider-alibabacloud -n kube-system
#
# - Verify environment variables are injected:
#   kubectl get daemonset csi-secrets-store-provider-alibabacloud -n kube-system \
#     -o jsonpath='{range .spec.template.spec.containers[0].env[*]}{.name}{"\n"}{end}'
#
# ============================================================================
