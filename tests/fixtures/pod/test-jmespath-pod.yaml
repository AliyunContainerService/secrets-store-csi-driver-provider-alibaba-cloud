# ============================================================================
# Test Case: TC-008 JMESPath JSON Parsing Test (Pod)
# Objective: Verify JMESPath extracts specific fields from JSON-formatted KMS Secret
# Auth Method: Inherits current Provider authentication configuration
# ============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: jmespath-test
  namespace: ${NAMESPACE}
  labels:
    test-case: TC-008
spec:
  containers:
  - name: test
    image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
    command: ["/bin/sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: secrets
      mountPath: "/mnt/secrets-store"
      readOnly: true
  volumes:
  - name: secrets
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "jmespath-test"
