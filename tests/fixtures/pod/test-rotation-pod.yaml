# ============================================================================
# Test Case: TC-009 Secret Rotation Test (Pod)
# Objective: Verify CSI mount content auto-rotates after KMS Secret update
# Auth Method: Inherits current Provider authentication configuration
# Prerequisite: CSI Driver must have enableSecretRotation enabled
# ============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: rotation-test
  namespace: ${NAMESPACE}
  labels:
    test-case: TC-009
spec:
  containers:
  - name: test
    image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
    command: ["/bin/sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: secrets
      mountPath: "/mnt/secrets-store"
      readOnly: true
  volumes:
  - name: secrets
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "rotation-test"
