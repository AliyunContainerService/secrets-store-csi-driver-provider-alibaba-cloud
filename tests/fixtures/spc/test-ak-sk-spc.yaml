# ============================================================================
# Test Case: TC-005 AK/SK Authentication Test (SecretProviderClass)
# Objective: Verify AK/SK access to KMS secrets
# Auth Method: AK/SK (credentials passed via nodePublishSecretRef)
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aksk-test
  namespace: ${NAMESPACE}
  labels:
    test-case: TC-005
spec:
  provider: alibabacloud
  parameters:
    env_auth_mode: aksk
    objects: |
      - objectName: "${AKSK_SECRET_NAME}"
        objectType: "kms"
