# ============================================================================
# Test Case: TC-007 ECS RAM Role Authentication Test (SecretProviderClass)
# Objective: Verify ECS instance RAM Role access to KMS secrets
# Auth Method: ECS RAM Role (fallback authentication)
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ecs-ram-role-test
  namespace: ${NAMESPACE}
  labels:
    test-case: TC-007
spec:
  provider: alibabacloud
  parameters:
    objects: |
      - objectName: "${ECS_ROLE_SECRET_NAME}"
        objectType: "kms"
