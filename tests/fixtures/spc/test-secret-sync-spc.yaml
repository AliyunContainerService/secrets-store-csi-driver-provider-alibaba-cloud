# ============================================================================
# Test Case: TC-010 K8s Secret Sync Test (SecretProviderClass)
# Objective: Verify SecretProviderClass secretObjects syncs KMS Secret to K8s Secret
# Auth Method: Inherits current Provider authentication configuration
# Prerequisite: CSI Driver must have syncSecret.enabled=true
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sync-test
  namespace: ${NAMESPACE}
  labels:
    test-case: TC-010
spec:
  provider: alibabacloud
  secretObjects:
  - secretName: "${K8S_SYNC_SECRET_NAME}"
    type: Opaque
    data:
    - objectName: "${SYNC_SECRET_NAME}"
      key: value
  parameters:
    objects: |
      - objectName: "${SYNC_SECRET_NAME}"
