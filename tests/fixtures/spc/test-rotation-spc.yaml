# ============================================================================
# Test Case: TC-009 Secret Rotation Test (SecretProviderClass)
# Objective: Verify CSI mount content auto-rotates after KMS Secret update
# Auth Method: Inherits current Provider authentication configuration
# Prerequisite: CSI Driver must have enableSecretRotation enabled
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: rotation-test
  namespace: ${NAMESPACE}
  labels:
    test-case: TC-009
spec:
  provider: alibabacloud
  parameters:
    objects: |
      - objectName: "${ROTATION_SECRET_NAME}"
