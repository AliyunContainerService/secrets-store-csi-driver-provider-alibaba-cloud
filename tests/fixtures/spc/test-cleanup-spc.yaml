# ============================================================================
# Test Case: TC-011 Post-Deletion Secret Cleanup Test (SecretProviderClass)
# Objective: Verify K8s Secret is automatically cleaned up after Pod deletion
# Auth Method: Inherits current Provider authentication configuration
# Prerequisite: CSI Driver must have syncSecret.enabled=true
# ============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cleanup-test
  namespace: ${NAMESPACE}
  labels:
    test-case: TC-011
spec:
  provider: alibabacloud
  secretObjects:
  - secretName: "${K8S_CLEANUP_SECRET_NAME}"
    type: Opaque
    data:
    - objectName: "${CLEANUP_SECRET_NAME}"
      key: value
  parameters:
    objects: |
      - objectName: "${CLEANUP_SECRET_NAME}"
