name: Test

on:
  push:
  pull_request:

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.0'
        check-latest: true
        cache: true
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.12.2
        skip-cache: true
        args: --verbose --timeout=10m --modules-download-mode=vendor
  go-security-scan:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail ./...'

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.0'
      env:
        GOPATH: ${{ env.HOME }}

    - name: Build
      run: make build